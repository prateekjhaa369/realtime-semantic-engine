<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS // Semantic Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="//unpkg.com/globe.gl"></script>
</head>

<body>
    <div class="glow-bg"></div>

    <header>
        <div class="logo">
            <span class="pulse-dot"></span>
            <h1>NEXUS // Semantic Engine</h1>
        </div>
        <div class="status-bar">
            <div class="status-item"><span class="label">SYSTEM STATUS:</span> <span
                    class="value success">OPTIMAL</span></div>
            <div class="status-item"><span class="label">INGESTION RATE:</span> <span class="value"
                    id="ingest-rate">1,245 ev/s</span></div>
            <div class="status-item"><span class="label">VECTOR LATENCY:</span> <span class="value">8ms</span></div>
        </div>
    </header>

    <main class="dashboard-grid">
        <section class="panel search-panel full-width">
            <div class="search-container">
                <input type="text" id="semantic-search"
                    placeholder="Query semantic vectors (e.g., 'Show anomalous offshore wire transfers > $50k')...">
                <div class="search-glow"></div>
            </div>
            <div id="search-results" class="results-container hidden">
                <!-- Results populate here -->
            </div>
        </section>

        <section class="panel list-panel">
            <div class="panel-header">
                <h2>LIVE EVENT STREAM</h2>
            </div>
            <div class="event-stream" id="event-stream">
                <!-- Events populate here -->
            </div>
        </section>

        <section class="panel map-panel">
            <div class="panel-header map-header">
                <h2>GLOBAL VECTOR ACTIVITY</h2>
            </div>
            <div id="globeViz" class="globe-container"></div>
        </section>

        <section class="panel chart-panel">
            <div class="panel-header">
                <h2>ANOMALY DETECTIONS</h2>
            </div>
            <div class="chart-container">
                <canvas id="anomalyChart"></canvas>
            </div>
        </section>

        <section class="panel metrics-panel">
            <div class="panel-header">
                <h2>SYSTEM METRICS</h2>
            </div>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">TOTAL EMBEDDINGS</div>
                    <div class="metric-value">4.2M</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">HOURLY VOLUME</div>
                    <div class="metric-value">$14.5M</div>
                </div>
                <div class="metric-card warning">
                    <div class="metric-label">CRITICAL ANOMALIES</div>
                    <div class="metric-value" id="anomaly-count">12</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">CACHE HIT RATIO</div>
                    <div class="metric-value">98.4%</div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
