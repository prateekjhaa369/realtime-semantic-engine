<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option B - Cyber Wireframe Globe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="//unpkg.com/globe.gl"></script>
</head>
<body>
    <div class="glow-bg"></div>
    <header>
        <div class="logo">
            <span class="pulse-dot"></span>
            <h1>NEXUS // Semantic Engine [Option B]</h1>
        </div>
    </header>

    <main class="dashboard-grid">
        <section class="panel search-panel full-width">
            <div class="search-container"><input type="text" placeholder="Query semantic vectors..."></div>
        </section>

        <section class="panel list-panel" style="grid-column: 1/2;">
            <div class="panel-header"><h2>LIVE EVENT STREAM</h2></div>
            <div class="event-stream" id="event-stream-b"></div>
        </section>

        <section class="panel map-panel" style="grid-column: 2 / 4; grid-row: 2/4;">
            <div class="panel-header map-header">
                <h2>GLOBAL VECTOR ACTIVITY (WIREFRAME)</h2>
                <div style="font-size: 0.7rem; color: var(--cyan);">[RENDERING HEX POLYS]</div>
            </div>
            <div id="globeVizB" class="globe-container"></div>
        </section>
    </main>
    <script src="script_b.js"></script>
</body>
</html>
