<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Cyber Wireframe UI (Option B)</title>
    <!-- Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    
    <style>
        /* BASE STYLES & VARIABLES (CYBER/HACKER THEME) */
        :root {
            --bg-color: #010306; /* Pitch black */
            --panel-bg: rgba(0, 26, 51, 0.4); /* Deep ocean transparent blue */
            --panel-border: #00BFFF; /* Solid bright blue borders */
            --primary-blue: #00BFFF;
            --cyan: #00E5FF;
            --text-main: #E0F7FA;
            --text-muted: #4DD0E1; /* Brighter muted text for cyber feel */
            --danger: #FF1744;
            --success: #00E676;
            --font: 'Space Grotesk', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                linear-gradient(rgba(0, 191, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 191, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px; /* Cyber grid background */
        }

        /* HEADER */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2rem;
            background: linear-gradient(90deg, rgba(0, 26, 51, 0.9), transparent);
            border-bottom: 2px solid var(--panel-border);
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.2);
            z-index: 10;
        }

        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo h1 {
            font-size: 1.6rem; color: var(--cyan);
            font-weight: 700; letter-spacing: 3px;
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 14px; height: 14px;
            background-color: var(--success); border-radius: 2px; /* Square dot */
            box-shadow: 0 0 15px var(--success);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .status-bar { display: flex; gap: 2.5rem; font-size: 0.95rem; font-weight: 600; font-family: 'Courier New', monospace;}
        .status-item .label { color: var(--text-muted); }
        .status-item .value { color: var(--success); }

        /* DASHBOARD GRID */
        .dashboard-grid {
            flex: 1; display: grid;
            grid-template-columns: 350px 1fr 350px; /* Fixed sides, large middle */
            grid-template-rows: auto 1fr auto;
            gap: 1.5rem; padding: 1.5rem;
            overflow: hidden;
        }

        /* HARD-EDGED PANELS (CYBER PUNK STYLE) */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 1.5rem;
            display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0, 191, 255, 0.05); /* Inner cyber glow */
            position: relative;
        }
        
        /* Sci-Fi Corner decorations */
        .panel::before { content: ''; position: absolute; top: -1px; left: -1px; width: 20px; height: 20px; border-top: 3px solid var(--cyan); border-left: 3px solid var(--cyan); }
        .panel::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 20px; height: 20px; border-bottom: 3px solid var(--cyan); border-right: 3px solid var(--cyan); }

        .panel-header {
            font-size: 0.85rem; font-weight: 700; color: var(--primary-blue);
            letter-spacing: 2px; margin-bottom: 1rem; 
            border-bottom: 1px dashed var(--panel-border); padding-bottom: 0.5rem;
        }

        /* SEARCH BAR */
        .search-panel { grid-column: 1 / -1; padding: 1rem; }
        .search-container { position: relative; }
        .search-container input {
            width: 100%; padding: 1rem 1rem 1rem 3rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--primary-blue);
            color: var(--cyan); font-family: 'Courier New', monospace; font-size: 1.1rem;
            outline: none; transition: all 0.2s;
        }
        .search-container::before {
            content: '>'; position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: var(--cyan); font-family: 'Courier New', monospace; font-size: 1.5rem; font-weight: bold;
        }
        .search-container input:focus { box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.3); border-color: var(--cyan); }

        /* LEFT: RADAR & ACTIVITY */
        .left-column { grid-column: 1 / 2; grid-row: 2 / 4; display: flex; flex-direction: column; gap: 1.5rem; }
        
        /* The Radar Scanner Feature */
        .radar-panel { 
            height: 250px; flex: none; /* Prevent shrinking when logs expand */
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; position: relative;
        }
        .radar {
            position: relative; width: 180px; height: 180px;
            border-radius: 50%; border: 1px solid var(--primary-blue);
            background: 
                linear-gradient(90deg, transparent 49%, var(--primary-blue) 50%, transparent 51%),
                linear-gradient(0deg, transparent 49%, var(--primary-blue) 50%, transparent 51%);
            box-shadow: inset 0 0 30px rgba(0, 191, 255, 0.3);
        }
        .radar::before {
            content: ''; position: absolute; width: 50%; height: 50%; top: 0; right: 0;
            background: linear-gradient(-45deg, rgba(0, 229, 255, 0.8) 0%, transparent 50%);
            transform-origin: 0% 100%;
            animation: scan 3s linear infinite;
        }
        @keyframes scan { 100% { transform: rotate(360deg); } }
        
        .radar-blip {
            position: absolute; width: 6px; height: 6px; background: var(--danger); border-radius: 50%;
            box-shadow: 0 0 10px var(--danger); opacity: 0; left: 60%; top: 30%;
        }
        .radar-blip.active { animation: blip 3s ease-out infinite; }
        @keyframes blip { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0; transform: scale(3); } 100% { opacity: 0; } }

        /* Hex stream */
        .hex-data { font-family: 'Courier New', monospace; font-size: 0.8rem; color: var(--text-muted); flex: 1; overflow: hidden; }
        .hex-line { opacity: 0; margin-bottom: 5px; animation: slideInX 0.3s forwards; }
        @keyframes slideInX { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* MIDDLE: THE WIREFRAME GLOBE */
        .map-panel { grid-column: 2 / 3; grid-row: 2 / 4; padding: 0; border: none; background: transparent; box-shadow: none; display: flex; flex-direction: column;}
        .map-panel .panel-header { background: var(--panel-bg); border: 1px solid var(--panel-border); padding: 1rem; margin:0; z-index: 2;}
        .map-container { position: relative; width: 100%; flex: 1; min-height: 400px; display: block; overflow: hidden;}
        
        #globe-container { position: absolute; top:0; left:0; width: 100%; height: 100%; cursor: crosshair; display: flex; justify-content: center; align-items: center;}
        #globe-container canvas { margin: auto; } /* Force canvas to center */
        
        /* Overlay UI on top of globe */
        .globe-overlay-stats {
            position: absolute; bottom: 10px; left: 10px; pointer-events: none;
            font-family: 'Courier New', monospace; color: var(--cyan); font-size: 0.85rem;
            background: rgba(0,0,0,0.6); padding: 10px; border: 1px solid var(--primary-blue);
        }

        /* RIGHT: THREAT ALERTS */
        .right-column { grid-column: 3 / 4; grid-row: 2 / 4; display: flex; flex-direction: column; gap: 1.5rem; }
        
        .alert-stream { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; overflow: hidden;}
        .alert-card {
            background: rgba(255, 23, 68, 0.1); border-left: 4px solid var(--danger);
            padding: 1rem; position: relative;
            animation: glitch-in 0.4s ease-out forwards;
        }
        @keyframes glitch-in {
            0% { transform: scale(0.9); opacity: 0; filter: contrast(200%); }
            50% { transform: scale(1.05); filter: invert(100%); }
            100% { transform: scale(1); opacity: 1; filter: none; }
        }
        .alert-title { color: var(--danger); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase;}
        .alert-hash { color: var(--text-muted); font-family: 'Courier New', monospace; font-size: 0.75rem;}

        .chart-container { height: 180px; }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="pulse-dot"></span>
            <h1>NEXUS [CYBER_CORE_ACTIVATED]</h1>
        </div>
        <div class="status-bar">
            <div class="status-item"><span class="label">NODE:</span> <span class="value">PRIMARY_01</span></div>
            <div class="status-item"><span class="label">UPTIME:</span> <span class="value" id="uptime">0d 0h 14m 22s</span></div>
            <div class="status-item"><span class="label">SEC_LEVEL:</span> <span class="value" style="color:var(--danger)">ELEVATED</span></div>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- TOP: COMMAND LINE SEARCH -->
        <section class="panel search-panel">
            <div class="search-container">
                <input type="text" id="semantic-search" placeholder="Execute semantic query > e.g. 'find anomalous routing patterns'">
            </div>
        </section>

        <!-- LEFT: RADAR & HEX DUMP -->
        <div class="left-column">
            <section class="panel radar-panel">
                <div class="panel-header" style="position: absolute; top:1.5rem; left:1.5rem; z-index:2; border:none;">THREAT RADAR</div>
                <div class="radar">
                    <div class="radar-blip active"></div>
                    <!-- Create a few random blips -->
                    <div class="radar-blip" style="left: 30%; top: 70%; animation-delay: 1s;"></div>
                    <div class="radar-blip" style="left: 70%; top: 50%; animation-delay: 2s;"></div>
                </div>
            </section>
            
            <section class="panel" style="flex:1;">
                <div class="panel-header">VECTOR HEX DUMP</div>
                <div class="hex-data" id="hex-stream"></div>
            </section>
        </div>

        <!-- MIDDLE: THE WIREFRAME GLOBE -->
        <section class="panel map-panel">
             <div class="panel-header">
                GLOBAL VECTORIZATION MESH <span class="pulse-dot" style="display:inline-block; margin-left:10px;"></span>
            </div>
            <div class="map-container">
                <div id="globe-container"></div>
                <div class="globe-overlay-stats">
                    > RENDERING HEX POLYS...<br>
                    > LATENCY: 2.1ms<br>
                    > CLUSTERS: 4,129
                </div>
            </div>
        </section>

        <!-- RIGHT: CRITICAL THREATS & CHARTS -->
        <div class="right-column">
             <section class="panel" style="flex: 1;">
                <div class="panel-header" style="color:var(--danger); border-bottom-color: var(--danger);">CRITICAL VECTOR ANOMALIES</div>
                <div class="alert-stream" id="alert-stream">
                    <!-- Populated by JS -->
                </div>
            </section>

            <section class="panel">
                <div class="panel-header">NETWORK STRESS</div>
                <div class="chart-container">
                    <canvas id="anomalyChart"></canvas>
                </div>
            </section>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script>
        // --- 1. GLOBE LOGIC (OPTION B: THE WIREFRAME) ---
        function initWireframeGlobe() {
            const container = document.getElementById('globe-container');
            
            const globe = Globe()(container)
                .globeImageUrl('earth-dark.jpg')
                .backgroundColor('rgba(0,0,0,0)')
                .showAtmosphere(true)
                .atmosphereColor('#00E5FF')
                .atmosphereAltitude(0.15)
                .width(container.clientWidth)
                .height(container.clientHeight)
                .pointOfView({ lat: 35, lng: -90, altitude: 1.8 });

            // Create flashing hexagonal data points (looks like a cyber skin)
            const regenerateHex = () => {
                const N = 400;
                return [...Array(N).keys()].map(() => ({
                    lat: (Math.random() - 0.5) * 180,
                    lng: (Math.random() - 0.5) * 360,
                    size: Math.random() * 0.4,
                    color: Math.random() > 0.95 ? '#FF1744' : '#00E5FF' // Mostly cyan, rare red threats
                }));
            };

            globe.hexPolygonData(regenerateHex())
                .hexPolygonColor(d => d.color)
                .hexPolygonResolution(3) // Make them rough hexagons
                .hexPolygonMargin(0.5) // The gap makes the wireframe look
                .hexPolygonAltitude(d => d.size);

            globe.controls().autoRotate = true;
            globe.controls().autoRotateSpeed = 1.0; // Spins faster than Option A

            // Flash the hex map every few seconds
            setInterval(() => {
                globe.hexPolygonData(regenerateHex());
            }, 3000);

            // Force resize a few times after load to guarantee centering
            let resizeCount = 0;
            const resizeInterval = setInterval(() => {
                const newWidth = container.clientWidth;
                const newHeight = container.clientHeight;
                if(newWidth > 0 && newHeight > 0) {
                    globe.width(newWidth);
                    globe.height(newHeight);
                }
                if(resizeCount++ > 10) clearInterval(resizeInterval);
            }, 200);

            window.addEventListener('resize', () => {
                const newWidth = container.clientWidth;
                const newHeight = container.clientHeight;
                if(newWidth > 0 && newHeight > 0) {
                    globe.width(newWidth);
                    globe.height(newHeight);
                }
            });
        }

        // --- 2. HEX DUMP STREAM (HACKER TEXT) ---
        const hexStream = document.getElementById('hex-stream');
        function addHexLog() {
            const hexLine = Array(6).fill(0).map(() => Math.floor(Math.random()*16777215).toString(16).padStart(6, '0').toUpperCase()).join(' ');
            const addr = '0x' + Math.floor(Math.random()*99999).toString(16).padStart(4, '0').toUpperCase();
            
            const el = document.createElement('div');
            el.className = 'hex-line';
            el.innerHTML = `<span style="color:var(--primary-blue)">${addr}</span>: ${hexLine}`;
            
            hexStream.prepend(el);
            if(hexStream.children.length > 20) hexStream.removeChild(hexStream.lastChild);
        }

        // --- 3. HIGH PRIORITY ANOMALY ALERTS ---
        const alertStream = document.getElementById('alert-stream');
        const threatActions = ["Dark Pool Crypto Swap", "High-Frequency Flash Trade", "Offshore Vault Breach", "DDoS Node Spawning"];

        function addThreatAlert() {
            const el = document.createElement('div');
            el.className = `alert-card`;
            
            const act = threatActions[Math.floor(Math.random() * threatActions.length)];
            const hash = 'VEC:' + Math.random().toString(36).substring(2, 12).toUpperCase();
            
            // Randomly blip the radar when a threat happens
            const blips = document.querySelectorAll('.radar-blip');
            blips.forEach(b => {
                b.style.left = Math.floor(Math.random() * 80 + 10) + '%';
                b.style.top = Math.floor(Math.random() * 80 + 10) + '%';
            });

            el.innerHTML = `
                <div class="alert-title">[THREAT_LOCK] ${act}</div>
                <div class="alert-hash">> MATCHED ON: ${hash} | CONFIDENCE: 99.4%</div>
            `;

            alertStream.prepend(el);
            if(alertStream.children.length > 5) alertStream.removeChild(alertStream.lastChild);
        }

        // --- 4. CHART.JS (AGGRESSIVE RED/CYAN STYLE) ---
        function initChart() {
            const ctx = document.getElementById('anomalyChart').getContext('2d');
            
            const chart = new Chart(ctx, {
                type: 'bar', // Using bar for a more analytical/cyber look
                data: {
                    labels: ['T1', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'T8', 'T9', 'T10'],
                    datasets: [{
                        label: 'Stress Load',
                        data: Array(10).fill(0).map(() => Math.random() * 50),
                        backgroundColor: '#00BFFF',
                        borderColor: '#00E5FF',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display:false },
                        y: { display:false, min: 0, max: 100 }
                    }
                }
            });

            setInterval(() => {
                const data = chart.data.datasets[0].data;
                const bgColors = chart.data.datasets[0].backgroundColor;
                
                if(!Array.isArray(bgColors)) chart.data.datasets[0].backgroundColor = Array(10).fill('#00BFFF');
                
                data.shift();
                chart.data.datasets[0].backgroundColor.shift();
                
                const val = Math.random() > 0.8 ? 80 + Math.random()*20 : Math.random()*40;
                data.push(val);
                chart.data.datasets[0].backgroundColor.push(val > 70 ? '#FF1744' : '#00BFFF'); // Red if high load
                
                chart.update('none');
            }, 1000); // Fast updates
        }

        // --- INIT ALL ---
        document.addEventListener('DOMContentLoaded', () => {
             // Wait for layout to finish calculating sizes for globe
            setTimeout(initWireframeGlobe, 500);
            initChart();
            
            setInterval(addHexLog, 200);
            
            // Start the severe alerts
            addThreatAlert();
            setInterval(addThreatAlert, 5000); 

            // Uptime Counter
            let ms = 862000;
            setInterval(() => {
                ms += 1000;
                document.getElementById('uptime').innerText = new Date(ms).toISOString().substr(11, 8);
            }, 1000);
            
            // Search Glitch interaction
            const searchInput = document.getElementById('semantic-search');
            searchInput.addEventListener('keypress', function(e) {
                if(e.key === 'Enter') {
                    document.body.style.filter = 'invert(100%) hue-rotate(180deg)';
                    setTimeout(() => { document.body.style.filter = 'none'; addThreatAlert(); }, 150);
                    setTimeout(() => { document.body.style.filter = 'invert(100%) hue-rotate(180deg)'; }, 300);
                    setTimeout(() => { document.body.style.filter = 'none'; }, 450);
                    this.value = '';
                }
            });
        });
    </script>
</body>
</html>
