<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option A - Holographic Background Globe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="//unpkg.com/globe.gl"></script>
    <style>
        /* Option A Specific Styles */
        body { background-color: #02050A; }
        .globe-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; opacity: 0.4;
        }
        .dashboard-grid {
            background: rgba(2, 5, 10, 0.6); /* Darken everything slightly so panels pop over the globe */
        }
        /* Hide the old map panel since the globe is in the background now */
        .map-panel { display: none; }
        .list-panel { grid-column: 2 / 3; } /* Expand the middle panel to fill the gap */
    </style>
</head>
<body>
    <div id="globeBg" class="globe-background"></div>

    <header>
        <div class="logo">
            <span class="pulse-dot"></span>
            <h1>NEXUS // Semantic Engine [Option A]</h1>
        </div>
        <div class="status-bar">
            <div class="status-item"><span class="label">SYSTEM:</span> <span class="value success">OPTIMAL</span></div>
            <div class="status-item"><span class="label">INGEST RATE:</span> <span class="value" id="ingest-rate-a">1,245 ev/s</span></div>
        </div>
    </header>

    <main class="dashboard-grid">
        <section class="panel search-panel full-width">
            <div class="search-container">
                <input type="text" id="semantic-search-a" placeholder="Query semantic vectors...">
            </div>
        </section>

        <!-- Enlarged Event Stream since Map is gone -->
        <section class="panel list-panel">
            <div class="panel-header"><h2>LIVE EVENT STREAM</h2></div>
            <div class="event-stream" id="event-stream-a"></div>
        </section>

        <!-- Keep charts and metrics on the side -->
        <div style="display:flex; flex-direction: column; gap: 1.5rem; grid-column: 1 / 2; grid-row: 2/4;">
            <section class="panel chart-panel" style="flex: 1;">
                <div class="panel-header"><h2>ANOMALY DETECTIONS</h2></div>
                <div class="chart-container"><canvas id="anomalyChartA"></canvas></div>
            </section>
        </div>

        <section class="panel metrics-panel" style="grid-column: 3/4; grid-row: 2/4;">
             <div class="panel-header"><h2>SYSTEM METRICS</h2></div>
             <div class="metrics-grid">
                 <div class="metric-card"><div class="metric-label">VOLUME</div><div class="metric-value">$14.5M</div></div>
                 <div class="metric-card warning"><div class="metric-label">ANOMALIES</div><div class="metric-value">12</div></div>
             </div>
        </section>
    </main>
    <script src="script_a.js"></script>
</body>
</html>
